<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Happy 5th Month Anniversary 😉❤️</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#ff758c,#ff7eb3);
      position:relative;
    }

    .container{
      width:90%;
      max-width:600px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius:25px;
      padding:35px;
      text-align:center;
      color:white;
      box-shadow:0 8px 30px rgba(0,0,0,0.25);
      animation: fadeIn 1.5s ease;
      z-index:2;
    }

    h1{
      font-size:42px;
      margin-bottom:20px;
    }

    .subtitle{
      font-size:22px;
      line-height:1.8;
      margin-bottom:25px;
    }

    .love-counter{
      background: rgba(255,255,255,0.2);
      padding:25px;
      border-radius:20px;
      margin-top:20px;
    }

    .counter-title{
      font-size:24px;
      margin-bottom:20px;
      font-weight:bold;
    }

    .time{
      font-size:28px;
      font-weight:bold;
      line-height:1.8;
    }

    .months{
      margin-top:20px;
      font-size:24px;
      color:#fff4f7;
      font-weight:bold;
    }

    .btn{
      margin-top:35px;
      padding:15px 35px;
      border:none;
      border-radius:40px;
      background:white;
      color:#ff4f81;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.08);
      background:#ffe4ec;
    }

    .heart{
      position:absolute;
      color:white;
      animation: float 6s linear infinite;
      opacity:0.8;
    }

    @keyframes float{
      0%{
        transform: translateY(100vh) scale(0);
      }

      100%{
        transform: translateY(-10vh) scale(1.5);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Happy 5th Month Anniversary Dishuu Babbbbyyyyyy 😊❤️</h1>

    <p class="subtitle">
      From 22 December 2025, 8:00 PM 🥰❤️<br>
      Our forever started here...
    </p>

    <div class="love-counter">

      <div class="counter-title">
        Time We Spent Together ❤️
      </div>

      <div class="time" id="timer">
        Loading...
      </div>

      <div class="months" id="months">
        Loading Months...
      </div>

    </div>

    <button class="btn" onclick="openGallery()">
      Continue ❤️
    </button>

  </div>

  <script>

    const startDate = new Date("December 22, 2025 20:00:00");

    function updateLoveTimer(){

      const now = new Date();

      let difference = now - startDate;

      const seconds = Math.floor((difference / 1000) % 60);
      const minutes = Math.floor((difference / (1000 * 60)) % 60);
      const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
      const days = Math.floor(difference / (1000 * 60 * 60 * 24));

      let months =
      (now.getFullYear() - startDate.getFullYear()) * 12;

      months += now.getMonth() - startDate.getMonth();

      if(now.getDate() < startDate.getDate()){
        months--;
      }

      document.getElementById("timer").innerHTML = `
        ${days} Days <br>
        ${hours} Hours ${minutes} Minutes <br>
        ${seconds} Seconds
      `;

      document.getElementById("months").innerHTML = `
        ❤️ ${months} Months Together ❤️🥹
      `;
    }

    setInterval(updateLoveTimer,1000);

    updateLoveTimer();

    function openGallery(){
      window.location.href = "gallery.html";
    }

    function createHeart(){

      const heart = document.createElement("div");

      heart.classList.add("heart");

      heart.innerHTML = "❤️";

      heart.style.left = Math.random() * 100 + "vw";

      heart.style.fontSize = (Math.random() * 20 + 15) + "px";

      document.body.appendChild(heart);

      setTimeout(()=>{
        heart.remove();
      },6000);
    }

    setInterval(createHeart,300);

  </script>

</body>
</html>
